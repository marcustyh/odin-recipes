<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Stardew Valley Recipes | Maki Roll</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap');
			
			body {
				font-family: "Geist Pixel";
				font-size: 40px;
				line-height: 1.1em;	
			}
			
			h1 {
				text-transform: uppercase; 
				font-weight: 400; 
				line-height: 1em;
				max-width: 800px;
				margin: 0 auto;
				text-align: center;
				color: #ff4100;
			}
		
			ol {
				padding-left: 50px;
				max-width: 85%;
				margin: 0 auto;
			}
	
			a {
				color: #000;
				text-decoration: none;
			}
			
			a:after {
				content: "↗︎";
				font-size: .8em;
			}
			
			a:hover {
				color: #ff5e0d;
			}

			ol li {
				margin-bottom: .5em;
				padding-bottom: .25em;
			}
			
			.image-container {
     		 	display: flex;
      			justify-content: center; /* Horizontal center */
      			align-items: center;     /* Vertical center */
      			width: 100%;
    		}

    		.image-container img {
      			max-width: 100%;
      			max-height: 100%;
      			height: auto;
      			display: block;
    		}

			.text {
				display: flex;
				justify-content: center;
			}

			.table {
				display: flex;
				justify-content: center;
			}

		</style>
	</head>

	<body>
		<header>
			<h1>Maki Roll</h1>
		</header>
		  <div class="image-container">
    		<img src="images/maki_roll.png" alt="Centered image">
  		</div>
		<div class="text">	
			<em>
			Fish and rice wrapped in seaweed.
			</em>
		</div>
		<table class="table" border="1" cellpadding="8" cellspacing="0">
  			<tbody>
    			<tr>
      				<th colspan="2">Information</th>
    			</tr>

    			<tr>
      				<th>Source</th>
      				<td>Cooking</td>
    			</tr>

    			<tr>
      				<th>Energy / Health</th>
      				<td>
        				<img src="Energy.png" alt="Energy" width="20">
        				100
        				<br>
        				<img src="Health.png" alt="Health" width="20">
        				45
      				</td>
    			</tr>

    			<tr>
      				<th>Sell Price</th>
      				<td>
        				<img src="Maki Roll.png" alt="Maki Roll" width="20">
        				220g
      				</td>
    			</tr>

    			<tr>
      				<th>Qi Seasoning</th>
      				<td>
        				<img src="Qi Seasoning.png" alt="Qi Seasoning" width="20"><br><br>

        				<img src="Energy.png" alt="Energy" width="20">
        				<img src="Gold Quality Icon.png" alt="Gold Quality" width="18">
        				180
        				<br>

        				<img src="Health.png" alt="Health" width="20">
        				<img src="Gold Quality Icon.png" alt="Gold Quality" width="18">
        				81
        				<br>			
						<br>

        				<img src="Maki Roll.png" alt="Maki Roll" width="20">
        				<img src="Gold Quality Icon.png" alt="Gold Quality" width="18">
        				330g
      				</td>
    			</tr>

    			<tr>
      				<th colspan="2">Recipe</th>
    			</tr>

    			<tr>
      				<th>Recipe Source(s)</th>
      				<td>
        				<img src="Cooking Channel.png" alt="Cooking Channel" width="20">
        				<strong>The Queen of Sauce</strong>
						<br>
        				21 Summer, Year 1
        				<br>	
						<br>

        				<img src="Gus Icon.png" alt="Gus" width="20">
        				Stardrop Saloon for
        				<img src="Gold.png" alt="Gold" width="18">
        				300g
      				</td>
    			</tr>

    			<tr>
      				<th>Ingredients</th>
      				<td>
        				<img src="Fish.png" alt="Fish" width="20">
        				Any Fish (1)
						<br>

        				<img src="Seaweed.png" alt="Seaweed" width="20">
        				Seaweed (1)	
						<br>

        				<img src="Rice.png" alt="Rice" width="20">
       					 Rice (1)
      				</td>
    			</tr>
  			</tbody>
		</table> 
	</body>
</html>
